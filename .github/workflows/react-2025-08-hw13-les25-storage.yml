name: Test, Lint, Build and Deploy on Github Pages

on:
  push:
    branches: ["react-2025-08-hw13-les25-storage"]
    # branches: ["master", "main"]

  # Позволяет запустить этот рабочий процесс вручную на вкладке Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:

  test-report:
    #find at https://alexanderpono.github.io/ponomarenko-alex-otus/react-2025-08/react-2025-08-hw13-les25-storage/test-report/testResult.html
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react-2025-08/react-2025-08-hw13-les25-storage

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Устанавливаем зависимости
      - name: Install dependencies
        run: npm install

      # Запускаем тесты и линтер
      - name: Run tests
        run: npm test

      - name: Deploy test-report to GHP /ponomarenko-alex-otus/react-2025-08/react-2025-08-hw13-les25-storage/test-report 🚀
        id: Deploy-Project
        uses: JamesIves/github-pages-deploy-action@4.2.1
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: react-2025-08/react-2025-08-hw13-les25-storage/temp  # The folder the action should deploy.
          target-folder: react-2025-08/react-2025-08-hw13-les25-storage/test-report
          clean: true # Automatically remove deleted files from the deploy branch

      # Останавливаем выполнение строго при неудачных тестах
      - name: Fail on failed tests
        run: |
          if [ ${{ job.status }} == 'failure' ]; then exit 1; fi;

  test-coverage-report:
    #find at https://alexanderpono.github.io/ponomarenko-alex-otus/react-2025-08/react-2025-08-hw13-les25-storage/test-coverage-report/lcov-report/
    runs-on: ubuntu-latest
    needs: test-report
    defaults:
      run:
        working-directory: react-2025-08/react-2025-08-hw13-les25-storage

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Устанавливаем зависимости
      - name: Install dependencies
        run: npm install

      # Запускаем тесты и линтер
      - name: Run tests
        run: npm test

      - name: Deploy test-report to GHP /ponomarenko-alex-otus/react-2025-08/react-2025-08-hw13-les25-storage/test-coverage-report 🚀
        id: Deploy-Project
        uses: JamesIves/github-pages-deploy-action@4.2.1
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: react-2025-08/react-2025-08-hw13-les25-storage/temp/coverage  # The folder the action should deploy.
          target-folder: react-2025-08/react-2025-08-hw13-les25-storage/test-coverage-report
          clean: true # Automatically remove deleted files from the deploy branch

      # Останавливаем выполнение строго при неудачных тестах
      # - name: Fail on failed tests
      #   run: |
      #     if [ ${{ job.status }} == 'failure' ]; then exit 1; fi;

  app:
    #find at https://alexanderpono.github.io/ponomarenko-alex-otus/react-2025-08/react-2025-08-hw13-les25-storage/app/
    runs-on: ubuntu-latest
    needs: test-coverage-report
    defaults:
      run:
        working-directory: react-2025-08/react-2025-08-hw13-les25-storage

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Устанавливаем зависимости
      - name: Install dependencies
        run: npm install

      # Запускаем тесты и линтер
      # - name: Run tests and linter
      #   run: npm run lint && npm test

      - name: Build project
        run: npm run build

      - name: Deploy project to GHP /ponomarenko-alex-otus/react-2025-08/react-2025-08-hw13-les25-storage 🚀
        id: Deploy-Project
        uses: JamesIves/github-pages-deploy-action@4.2.1
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: react-2025-08/react-2025-08-hw13-les25-storage/dist  # The folder the action should deploy.
          target-folder: react-2025-08/react-2025-08-hw13-les25-storage/app
          clean: true # Automatically remove deleted files from the deploy branch

      # Останавливаем выполнение строго при неудачных тестах
      # - name: Fail on failed tests
      #   run: |
      #     if [ ${{ job.status }} == 'failure' ]; then exit 1; fi;

  storybook:
    #find at https://alexanderpono.github.io/ponomarenko-alex-otus/react-2025-08/react-2025-08-hw13-les25-storage/storybook/?path=/docs/features-editproductform--docs
    runs-on: ubuntu-latest
    needs: app
    defaults:
      run:
        working-directory: react-2025-08/react-2025-08-hw13-les25-storage

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Устанавливаем зависимости
      - name: Install dependencies
        run: npm install

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy Storybook to GHP /ponomarenko-alex-otus/react-2025-08/react-2025-08-hw13-les25-storage/storybook 🚀
        id: Deploy-Storybook
        uses: JamesIves/github-pages-deploy-action@4.2.1
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: react-2025-08/react-2025-08-hw13-les25-storage/storybook-static  # The folder the action should deploy.
          target-folder: react-2025-08/react-2025-08-hw13-les25-storage/storybook
          clean: true # Automatically remove deleted files from the deploy branch



